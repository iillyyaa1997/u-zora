name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: build + test
    # NOTE: `macos-26-arm` is preferred when GitHub-Actions ships a 26
    # Tahoe Apple-Silicon runner. Until then we ride `macos-latest` and
    # accept that `LSMinimumSystemVersion = 26.0` may not match the
    # runner's OS — the build still compiles because Swift 6 + the
    # macOS 26 SDK are toolchain-driven, not runner-OS-driven. Tests
    # that touch live IOKit / SMC will degrade-to-no-op rather than
    # fail on a `macos-14` runner.
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift toolchain
        run: |
          swift --version
          xcrun --show-sdk-version

      - name: Build (release)
        run: swift build -c release

      - name: Build (debug, for tests)
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Verify Info.plist LSMinimumSystemVersion
        run: |
          plutil -extract LSMinimumSystemVersion raw Sources/uZora/Support/Info.plist \
            | tee /tmp/min-os-version
          test "$(cat /tmp/min-os-version)" = "26.0"

  e2e:
    name: end-to-end
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: which jq || brew install jq

      - name: End-to-end harness
        # Launches the real release binary in an isolated environment and
        # exercises every external surface (REST / MCP / SSE / JSONL /
        # SQLite / restart-persistence / graceful shutdown) through real
        # process boundaries. The synthetic-alert test seam makes the run
        # deterministic regardless of the runner's hardware state.
        run: Tests/e2e/run-e2e.sh
