# uZora configuration — TOML
#
# This file is auto-generated on first launch at
#   ~/Library/Application Support/uZora/config.toml
# Edit and save — uZora hot-reloads the changes within ~150ms.

[general]
# Register the app as a login item via SMAppService.
start_at_login = false
# UI language: "system", "en", "ru"
language = "system"
# Appearance: "system", "light", "dark"
theme = "system"
# JSONL event-log retention in days.
log_retention_days = 30

[http]
# Bridge HTTP server on 127.0.0.1.
enabled = true
port = 39842

[mcp]
# Toggle MCP without disabling the rest of the HTTP bridge.
enabled = true
# Global write gate for the bridge. When true (default — loopback-only
# personal use) the write surfaces are live:
#   MCP tools : uzora_ack_alert, uzora_set_probe_config
#   REST      : POST /alerts/ack, POST /config/probe
# When false they all return HTTP 403 / MCP isError. The write tools are
# still ADVERTISED in tools/list (with a "writes disabled" note) so clients
# get a clear error instead of "unknown tool". This is a single on/off, not
# per-client auth.
allow_writes = true

[notifications]
# Banner severity floor: "info", "warn", "critical".
banner_severity_floor = "warn"
# Suppress warn banners while Focus is active (critical always pierces).
respect_focus = true

# Per-probe overrides. Every section accepts:
#   enabled            (bool, default true) — a disabled probe is NOT run.
#   poll_interval_sec  (int)  — override the probe's default cadence. The
#                               active power profile still multiplies this
#                               (e.g. on battery the effective interval is
#                               longer). Omit to keep the probe default.
#   warn_threshold     (float, probe-specific units — see each section)
#   critical_threshold (float, probe-specific units — see each section)
#
# Threshold UNITS differ per probe and several probes IGNORE the generic
# warn/critical pair entirely (their alerting is multi-dimensional or
# discrete). Each section below documents exactly what applies.
# Omitted threshold keys keep the probe's built-in default.

# disk — boot-volume free space.
#   warn_threshold / critical_threshold: PERCENT free (e.g. 15 = warn when
#     under 15% free; 5 = critical under 5%). Defaults: warn 15, critical 5.
[probes.disk]
enabled = true
# warn_threshold = 15
# critical_threshold = 5

# cpu_temp — CPU package temperature.
#   warn_threshold / critical_threshold: degrees CELSIUS (e.g. 90 / 100).
#   Defaults: warn 90, critical 100.
[probes.cpu_temp]
enabled = true
# warn_threshold = 90
# critical_threshold = 100

# thermal — ProcessInfo thermal pressure (nominal/fair/serious/critical).
#   IGNORES warn_threshold / critical_threshold (discrete state mapping).
#   Only `enabled` and `poll_interval_sec` apply.
[probes.thermal]
enabled = true

# battery — charge %, cycle count, and condition string.
#   IGNORES warn_threshold / critical_threshold (multi-dimensional; not
#   config-exposed in MVP). Only `enabled` and `poll_interval_sec` apply.
[probes.battery]
enabled = true

# smart — internal NVMe health (available-spare %, used %, media errors,
#   critical-warning bitmask).
#   IGNORES warn_threshold / critical_threshold (multi-dimensional; not
#   config-exposed in MVP). Only `enabled` and `poll_interval_sec` apply.
[probes.smart]
enabled = true

# fan — fan RPM (low-RPM stuck-fan AND high-RPM noisy detection).
#   IGNORES warn_threshold / critical_threshold (two-sided low/high band
#   doesn't map to a single generic pair; not config-exposed in MVP).
#   Only `enabled` and `poll_interval_sec` apply.
[probes.fan]
enabled = true

# kernel_task — kernel_task CPU% (Apple-Silicon throttling indicator).
#   warn_threshold / critical_threshold: CPU PERCENT (e.g. 25 / 50).
#   Defaults: warn 25, critical 50. (Sustained-window seconds are fixed.)
[probes.kernel_task]
enabled = true
# warn_threshold = 25
# critical_threshold = 50

# top_cpu — busiest process CPU%.
#   warn_threshold / critical_threshold: CPU PERCENT (e.g. 50 / 80).
#   Defaults: warn 50, critical 80. (Sustained-window seconds are fixed.)
[probes.top_cpu]
enabled = true
# warn_threshold = 50
# critical_threshold = 80

# top_mem — largest-RSS process.
#   warn_threshold / critical_threshold: GIGABYTES of resident memory
#   (binary GiB, e.g. 8 / 16). Defaults: warn 8, critical 16.
[probes.top_mem]
enabled = true
# warn_threshold = 8
# critical_threshold = 16

# top_net — busiest process network throughput (in + out).
#   warn_threshold / critical_threshold: MEGABYTES per second (binary
#   MiB/s, e.g. 50 / 200). Defaults: warn 50, critical 200.
#   (Sustained-window seconds are fixed.)
[probes.top_net]
enabled = true
# warn_threshold = 50
# critical_threshold = 200

# Per power-state overrides. Empty sections take the built-in defaults
# (see Core/PowerProfile.swift `defaultMapping`).
[power_profiles.ac_open]

[power_profiles.ac_closed]

[power_profiles.battery_open]

[power_profiles.battery_closed]

[power_profiles.focus]

# ──────────────────────────────────────────────────────────────────────────
# Auto-actions (Q10) — reversible cleanup uZora can run.
#
# Two ways an action runs:
#   1. CONFIRMED — a notification "Run cleanup" button you click yourself.
#      Works regardless of the per-action auto_enabled flag below.
#   2. AUTO      — fully automatic when a mapped alert fires AND you've opted
#      that action in (auto_enabled = true) AND every safety gate passes.
#
# EVERYTHING IS OFF BY DEFAULT. Each action's auto_enabled defaults to false;
# opt in per action. All four MVP actions are reversible and require no sudo,
# and are bound to the `disk` alert at warn/critical by default.
#
# Safety gate chain (each mechanism is configurable here EXCEPT the audit log,
# which is always on and cannot be disabled):
#   reversibility → enabled → power-gate → focus-gate → cool-down → rate-limit
[actions]
# Don't repeat the SAME action within this many minutes (anti-flapping).
cool_down_enabled = true
cool_down_minutes = 30
# Cap fully-AUTO runs per rolling hour (confirmed clicks don't count).
rate_limit_enabled = true
rate_limit_per_hour = 6
# Skip AUTO actions while on battery (confirmed clicks still run).
power_gate = true
# Skip AUTO actions while a Focus session is active.
focus_gate = true
# Compute a dry-run preview (estimated freed bytes) before executing.
dry_run_preview = true

# Per-action opt-in. Each section accepts:
#   auto_enabled    (bool, default false) — opt in to FULLY-AUTOMATIC runs.
#   probe           (string) — override which probe fires this action
#                              (default "disk"). Q6 config-override.
#   severity_floor  ("info"|"warn"|"critical") — override the minimum alert
#                              severity that makes this action eligible
#                              (default "warn").

# prune_apfs_snapshots — `tmutil deletelocalsnapshots /`. Reversible: macOS
#   recreates local Time Machine snapshots automatically.
[actions.prune_apfs_snapshots]
auto_enabled = false
# probe = "disk"
# severity_floor = "warn"

# clear_derived_data — remove ~/Library/Developer/Xcode/DerivedData. Xcode
#   rebuilds it on the next build.
[actions.clear_derived_data]
auto_enabled = false

# brew_cleanup — `brew cleanup`. No-op/skipped if Homebrew is not installed.
[actions.brew_cleanup]
auto_enabled = false

# clear_user_caches — remove ~/Library/Caches contents. CAUTION: some apps
#   store login/session state under Caches and may need to re-authenticate or
#   rebuild settings after this runs.
[actions.clear_user_caches]
auto_enabled = false

# Menu-bar popover layout (A3a).
[ui.popover]
# Active layout preset: "minimal" (default), "balanced", "diagnosis", "power".
#   minimal   — verdict + attention + a lean system-overview (mem-pressure /
#               CPU / disk). Top processes + recent actions hidden.
#   balanced  — every block and tile visible.
#   diagnosis — findings-forward: adds top processes; shows only the
#               mem-pressure + CPU tiles.
#   power     — everything on.
preset = "minimal"
# Optional customized layout as a compact JSON string. EMPTY ⇒ use the preset
# above as-is. A non-empty value forks the preset (block order + per-block and
# per-tile show/hide). A malformed value is ignored (falls back to the preset).
# Normally written by the Settings "Layout" tab, not hand-edited.
layout_json = ""
